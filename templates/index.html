<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>极简足球统计预测</title>
    <link href="https://cdn.staticfile.org/twitter-bootstrap/5.1.1/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .match-card { margin-bottom: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .prob-bar { height: 10px; border-radius: 5px; }
    </style>
</head>
<body>
<div class="container py-5">
    <h1 class="text-center mb-4">StatsUltra 中文克隆版</h1>
    <div class="row">
        {% for match in matches %}
        <div class="col-md-6 offset-md-3">
            <div class="card match-card p-3">
                <div class="d-flex justify-content-between align-items-center">
                    <span class="badge bg-primary">{{ match.league }}</span>
                    <span class="text-muted">预测结果: <strong>{{ match.prediction }}</strong></span>
                </div>
                <hr>
                <div class="row text-center">
                    <div class="col-5"><h5>{{ match.home }}</h5></div>
                    <div class="col-2">VS</div>
                    <div class="col-5"><h5>{{ match.away }}</h5></div>
                </div>
                <div class="mt-3">
                    <p class="small mb-1">胜率分布 (胜/平/负)</p>
                    <div class="progress prob-bar">
                        <div class="progress-bar bg-success" style="width: {{ match.win_prob }}"></div>
                        <div class="progress-bar bg-warning" style="width: {{ match.draw_prob }}"></div>
                        <div class="progress-bar bg-danger" style="width: {{ match.loss_prob }}"></div>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>

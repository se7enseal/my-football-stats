<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StatsUltra Pro | 实时足球预测</title>
    <link href="https://lf6-cdn-tos.bytecdntp.com/cdn/expire-1-M/bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; font-family: 'PingFang SC', sans-serif; }
        .match-card { border: none; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 25px; background: white; }
        .card-header { background: #001529; color: #fff; border-radius: 16px 16px 0 0 !important; font-weight: 600; padding: 12px 20px; }
        .team-logo { width: 60px; height: 60px; object-fit: contain; }
        .prediction-tag { background: #fff7e6; color: #fa8c16; border: 1px solid #ffd591; font-weight: bold; padding: 6px 16px; border-radius: 8px; font-size: 0.95rem; }
        .analysis-box { background: #f9f9f9; border-radius: 10px; padding: 15px; font-size: 0.9rem; color: #555; border-left: 5px solid #1890ff; }
        .vs-label { color: #bfbfbf; font-style: italic; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <h2 class="fw-bold text-dark">⚽ StatsUltra <span class="text-primary">Pro</span></h2>
        <span class="badge rounded-pill bg-success px-3">API 实时数据已接入</span>
    </div>

    <div class="row justify-content-center">
        {% for match in matches %}
        <div class="col-lg-10">
            <div class="card match-card">
                <div class="card-header d-flex justify-content-between">
                    <span>{{ match.league }}</span>
                    <span>{{ match.time }}</span>
                </div>
                <div class="card-body p-4">
                    <div class="row align-items-center text-center">
                        <div class="col-4">
                            <img src="{{ match.home_logo }}" class="team-logo mb-2">
                            <div class="fw-bold fs-5">{{ match.home }}</div>
                        </div>
                        <div class="col-4">
                            <div class="vs-label mb-2">VS</div>
                            <div class="prediction-tag">AI 建议: {{ match.prediction }}</div>
                        </div>
                        <div class="col-4">
                            <img src="{{ match.away_logo }}" class="team-logo mb-2">
                            <div class="fw-bold fs-5">{{ match.away }}</div>
                        </div>
                    </div>
                    <div class="mt-4 analysis-box">
                        <span class="fw-bold text-dark">专家分析：</span>{{ match.analysis }}
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

</body>
</html>
